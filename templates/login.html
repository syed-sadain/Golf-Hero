{% extends "base.html" %}
{% block title %}Login — GolfHero{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:calc(var(--nav-h)+3rem) 1.5rem 4rem;">
  <div style="width:100%;max-width:440px;">
    <div class="text-center mb-3 fade-up">
      <div style="font-size:3rem;margin-bottom:.5rem;">⛳</div>
      <h1>Welcome Back</h1>
      <p>Log in to your GolfHero account</p>
    </div>
    <div class="glass fade-up fade-up-1" style="padding:2.5rem;">
      <form method="POST">
        <div class="form-group">
          <label>Email Address</label>
          <input class="form-control" type="email" name="email" placeholder="you@example.com" required autofocus />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="form-control" type="password" name="password" placeholder="Your password" required />
        </div>
        <button type="submit" class="btn btn-primary w-full mt-2" style="justify-content:center;font-size:1.05rem;padding:.9rem;">
          Log In →
        </button>
        <p class="text-center mt-2" style="font-size:.82rem;color:var(--text-muted)">
          No account yet? <a href="{{ url_for('signup') }}">Join GolfHero →</a>
        </p>
      </form>
    </div>
    <p class="text-center mt-2" style="font-size:.78rem;color:var(--text-muted)">
      Admin demo: admin@golfhero.com / Admin@123
    </p>
  </div>
</div>
{% endblock %}
